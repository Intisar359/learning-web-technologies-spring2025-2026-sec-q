<!DOCTYPE html>
<html>
<head>
<title>Tic Tac Toe</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Tic Tac Toe</h2>
<h3 id="status">Player X Turn</h3>

<div id="board">
<div class="cell" onclick="play(this,0)"></div>
<div class="cell" onclick="play(this,1)"></div>
<div class="cell" onclick="play(this,2)"></div>
<div class="cell" onclick="play(this,3)"></div>
<div class="cell" onclick="play(this,4)"></div>
<div class="cell" onclick="play(this,5)"></div>
<div class="cell" onclick="play(this,6)"></div>
<div class="cell" onclick="play(this,7)"></div>
<div class="cell" onclick="play(this,8)"></div>
</div>

<button onclick="resetGame()">Reset</button>

<script>

let cells = document.getElementsByClassName("cell");
let player = "X";
let game = true;

let win = [
[0,1,2],
[3,4,5],
[6,7,8],
[0,3,6],
[1,4,7],
[2,5,8],
[0,4,8],
[2,4,6]
];

function play(cell,i){

if(cell.innerHTML!="" || !game) return;

cell.innerHTML = player;

checkWin();

if(game){
player = (player=="X") ? "O" : "X";
document.getElementById("status").innerHTML = "Player "+player+" Turn";
}

}

function checkWin(){

for(let i=0;i<win.length;i++){

let a = win[i][0];
let b = win[i][1];
let c = win[i][2];

if(
cells[a].innerHTML!="" &&
cells[a].innerHTML==cells[b].innerHTML &&
cells[b].innerHTML==cells[c].innerHTML
){

cells[a].classList.add("winner");
cells[b].classList.add("winner");
cells[c].classList.add("winner");

document.getElementById("status").innerHTML="Player "+player+" Wins!";
game=false;
}
}

}

function resetGame(){

for(let i=0;i<cells.length;i++){
cells[i].innerHTML="";
cells[i].classList.remove("winner");
}

player="X";
game=true;
document.getElementById("status").innerHTML="Player X Turn";

}

</script>

</body>
</html>
