<!DOCTYPE html>
<html>
<body>

<form id="nameForm">
    <label>Name</label><br>
    <input type="text" id="name"><br><br>
    <input type="submit" value="Submit">
</form>

<script>
document.getElementById('nameForm').addEventListener('submit', function(event) {
    event.preventDefault(); 
    
    const name = document.getElementById('name').value.trim();
    

    if (!name) {
        alert('Error: Name cannot be empty.');
    } 
    

    else if (!(name.charAt(0).toLowerCase() >= 'a' && 
               name.charAt(0).toLowerCase() <= 'z')) {
        alert('Error: Name must start with a letter.');
    } 
    
    else {
        for (let i = 0; i < name.length; i++) {
            let ch = name.charAt(i);
            
            if (!(
                (ch >= 'a' && ch <= 'z') ||
                (ch >= 'A' && ch <= 'Z') ||
                ch == '.' ||
                ch == '-' ||
                ch == ' '
            )) {
                alert('Error: Name can only contain letters, dot (.), dash (-), and space.');
                return;
            }
        }


        if (!name.includes(" ")) {
            alert("Error: Name must contain at least two words.");
        } 
        else {
            alert('Validation passed successfully!');
        }
    }
});
</script>

</body>
</html>
