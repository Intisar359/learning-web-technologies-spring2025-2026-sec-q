<!DOCTYPE html>
<html>
<body>

<form id="genderForm">
    <fieldset style="width: 250px;">
        <legend>Gender</legend>
        <input type="radio" name="gender" value="Male"> Male
        <input type="radio" name="gender" value="Female"> Female
        <input type="radio" name="gender" value="Other"> Other
    </fieldset>
    <br>
    <input type="submit" value="Submit">
</form>

<script>
document.getElementById("genderForm").addEventListener("submit", function(event) {
    event.preventDefault();

    let selected = document.querySelector('input[name="gender"]:checked');

    if (!selected) {
        alert("Error: Please select a gender.");
    } else {
        alert("Validation passed successfully!");
    }
});
</script>

</body>
</html>
